repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: [pydantic, types-pyyaml]
        # Only check the importable library code in ingestion/src/.
        # pipeline/ and ingestion/jobs/ are Databricks notebook files that rely
        # on runtime-injected globals (spark, dbutils, dlt) which mypy cannot
        # resolve statically — they are intentionally excluded.
        files: ^ingestion/src/
