dataContractSpecification: 0.9.2
id: sc-analytics.dashboard_assets.wipe_cooldown_utilization
info:
  title: Wipe Cooldown Utilization Dashboard Asset
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  wipe_cooldown_utilization:
    type: table
    primaryKey:
    - boss_name
    - zone_name
    - difficulty_label
    - cooldown_category
    - player_identity_key
    - ability_id
    fields:
      boss_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      zone_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      difficulty_label:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      cooldown_category:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      player_identity_key:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      player_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      player_class:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      realm:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      ability_id:
        type: integer
        required: true
        nullable: false
      ability_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      possible_casts:
        type: integer
        required: true
        nullable: false
      observed_casts:
        type: integer
        required: true
        nullable: false
      actual_casts:
        type: integer
        required: true
        nullable: false
      over_capacity_casts:
        type: integer
        required: true
        nullable: false
      missed_casts:
        type: integer
        required: true
        nullable: false
x-sc-analytics:
  dashboardAsset:
    dataset: wipe_cooldown_utilization
    sourceTable: 03_gold.sc_analytics.gold_wipe_cooldown_utilization
    publishedPath: wipe_cooldown_utilization.json
    grain: One row per boss, zone, difficulty, cooldown category, player, and ability in the published aggregation.
    consumers:
    - frontend static dashboard
    rules:
    - name: valid_cooldown_category
      field: cooldown_category
      enum:
      - personal
      - personal_spec
      - raid
      - external
    - name: non_negative_counts
      expression: possible_casts >= 0 and observed_casts >= 0 and actual_casts >= 0 and over_capacity_casts >=
        0 and missed_casts >= 0
    - name: scored_actual_not_over_capacity
      expression: actual_casts <= possible_casts
    - name: observed_not_below_scored
      expression: observed_casts >= actual_casts
    - name: over_capacity_formula
      expression: over_capacity_casts == observed_casts - actual_casts
    - name: missed_casts_formula
      expression: missed_casts == possible_casts - actual_casts
