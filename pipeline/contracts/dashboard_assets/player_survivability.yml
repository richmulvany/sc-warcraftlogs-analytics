dataContractSpecification: 0.9.2
id: sc-analytics.dashboard_assets.player_survivability
info:
  title: Player Survivability Dashboard Asset
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  player_survivability:
    type: table
    primaryKey:
    - player_identity_key
    fields:
      player_identity_key:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      player_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      player_class:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      realm:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      total_deaths:
        type: integer
        required: true
        nullable: false
      kills_tracked:
        type: integer
        required: true
        nullable: false
      deaths_per_kill:
        type: number
        required: true
        nullable: false
      most_common_killing_blow:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      most_common_killing_blow_count:
        type: integer
        required: false
        nullable: true
      top_killing_blows_json:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      zones_died_in:
        type: array
        required: false
        nullable: true
      last_death_timestamp_ms:
        type: integer
        required: false
        nullable: true
x-sc-analytics:
  dashboardAsset:
    dataset: player_survivability
    sourceTable: 03_gold.sc_analytics.gold_player_survivability
    publishedPath: player_survivability.json
    grain: One row per player identity with all-time death statistics.
    consumers:
    - frontend static dashboard
