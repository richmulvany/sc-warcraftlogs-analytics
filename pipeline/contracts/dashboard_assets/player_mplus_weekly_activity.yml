        nullable: false
        allowEmpty: false
      realm_slug:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      region:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      season:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      week_start:
        type: date
        required: true
        nullable: false
      total_runs:
        type: integer
        required: true
        nullable: false
      timed_runs:
        type: integer
        required: true
        nullable: false
      untimed_runs:
        type: integer
        required: true
        nullable: false
      highest_key_level:
        type: integer
        required: false
        nullable: true
      unique_dungeons:
        type: integer
        required: true
        nullable: false
      most_common_key_level:
        type: integer
        required: false
        nullable: true
x-sc-analytics:
