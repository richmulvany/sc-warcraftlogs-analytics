dataContractSpecification: 0.9.2
id: sc-analytics.dashboard_assets.best_kills
info:
  title: Best Kills Dashboard Asset
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  best_kills:
    type: table
    primaryKey:
    - encounter_id
    - boss_name
    - zone_name
    - difficulty
    fields:
      encounter_id:
        type: integer
        required: true
        nullable: false
      boss_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      zone_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      difficulty:
        type: integer
        required: true
        nullable: false
      difficulty_label:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      best_kill_seconds:
        type: number
        required: true
        nullable: false
      avg_kill_seconds:
        type: number
        required: true
        nullable: false
      total_kills:
        type: integer
        required: true
        nullable: false
      first_kill_date:
        type: date
        required: true
        nullable: false
      latest_kill_date:
        type: date
        required: true
        nullable: false
      best_kill_mm_ss:
        type: string
        required: true
        nullable: false
        allowEmpty: false
x-sc-analytics:
  dashboardAsset:
    dataset: best_kills
    sourceTable: 03_gold.sc_analytics.gold_best_kills
    publishedPath: best_kills.json
    grain: One row per encounter, boss, zone, and difficulty with at least one kill.
    consumers:
    - frontend static dashboard
    rules:
    - name: valid_difficulty
      field: difficulty_label
      enum:
      - Normal
      - Heroic
      - Mythic
    - name: positive_kill_count
      expression: total_kills > 0
