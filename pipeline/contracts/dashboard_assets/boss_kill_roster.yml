dataContractSpecification: 0.9.2
id: sc-analytics.dashboard_assets.boss_kill_roster
info:
  title: Boss Kill Roster Dashboard Asset
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  boss_kill_roster:
    type: table
    primaryKey: [report_code, fight_id, player_identity_key]
    fields:
      report_code: { type: string, required: true, nullable: false, allowEmpty: false }
      fight_id: { type: integer, required: true, nullable: false }
      boss_name: { type: string, required: true, nullable: false, allowEmpty: false }
      encounter_id: { type: integer, required: true, nullable: false }
      difficulty_label: { type: string, required: true, nullable: false, allowEmpty: false }
      zone_name: { type: string, required: true, nullable: false, allowEmpty: false }
      raid_night_date: { type: date, required: true, nullable: false }
      player_identity_key: { type: string, required: true, nullable: false, allowEmpty: false }
      player_name: { type: string, required: true, nullable: false, allowEmpty: false }
      player_class: { type: string, required: true, nullable: false, allowEmpty: false }
      realm: { type: string, required: true, nullable: false, allowEmpty: false }
      role: { type: string, required: false, nullable: true, allowEmpty: true }
      potion_use: { type: integer, required: true, nullable: false }
      has_food_buff: { type: boolean, required: true, nullable: false }
      has_flask_or_phial_buff: { type: boolean, required: true, nullable: false }
      has_weapon_enhancement: { type: boolean, required: true, nullable: false }
x-sc-analytics:
  dashboardAsset:
    dataset: boss_kill_roster
    sourceTable: 03_gold.sc_analytics.gold_boss_kill_roster
    publishedPath: boss_kill_roster.json
    grain: One row per player on each tracked boss kill.
    consumers:
      - frontend/src/pages/Preparation.tsx
      - frontend/src/features/player-detail/index.tsx
    rules:
      - name: valid_difficulty
        field: difficulty_label
        enum: [Normal, Heroic, Mythic]
      - name: non_negative_potions
        expression: potion_use >= 0
