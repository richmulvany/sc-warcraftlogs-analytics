dataContractSpecification: 0.9.2
id: sc-analytics.dashboard_assets.raid_summary
info:
  title: Raid Summary Dashboard Asset
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  raid_summary:
    type: table
    primaryKey: [report_code]
    fields:
      report_code: { type: string, required: true, nullable: false, allowEmpty: false }
      report_title: { type: string, required: true, nullable: false, allowEmpty: true }
      zone_name: { type: string, required: true, nullable: false, allowEmpty: false }
      raid_night_date: { type: date, required: true, nullable: false }
      total_pulls: { type: integer, required: true, nullable: false }
      boss_kills: { type: integer, required: true, nullable: false }
      total_wipes: { type: integer, required: true, nullable: false }
      total_fight_seconds: { type: number, required: true, nullable: false }
      unique_bosses_engaged: { type: integer, required: true, nullable: false }
      unique_bosses_killed: { type: integer, required: true, nullable: false }
x-sc-analytics:
  dashboardAsset:
    dataset: raid_summary
    sourceTable: 03_gold.sc_analytics.gold_raid_summary
    publishedPath: raid_summary.json
    grain: One row per WarcraftLogs report.
    consumers:
      - frontend/src/pages/Overview.tsx
      - frontend/src/pages/Raids.tsx
    rules:
      - name: pull_counts
        expression: total_pulls == boss_kills + total_wipes and total_pulls >= 0
