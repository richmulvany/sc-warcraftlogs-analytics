dataContractSpecification: 0.9.2
id: sc-analytics.dashboard_assets.player_attendance
info:
  title: Player Attendance Dashboard Asset
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  player_attendance:
    type: table
    primaryKey: [player_identity_key]
    fields:
      player_identity_key: { type: string, required: true, nullable: false, allowEmpty: false }
      player_name: { type: string, required: true, nullable: false, allowEmpty: false }
      player_class: { type: string, required: true, nullable: false, allowEmpty: false }
      player_realm: { type: string, required: true, nullable: false, allowEmpty: false }
      total_raids_tracked: { type: integer, required: true, nullable: false }
      raids_present: { type: integer, required: true, nullable: false }
      raids_benched: { type: integer, required: true, nullable: false }
      raids_absent: { type: integer, required: true, nullable: false }
      attendance_rate_pct: { type: number, required: true, nullable: false }
x-sc-analytics:
  dashboardAsset:
    dataset: player_attendance
    sourceTable: 03_gold.sc_analytics.gold_player_attendance
    publishedPath: player_attendance.json
    grain: >
      One row per player name, class, and resolved realm. Realm is resolved from
      the per-report actor roster when available; otherwise the explicit
      sentinel value unknown is used.
    consumers:
      - frontend/src/pages/Attendance.tsx
      - frontend/src/pages/Players.tsx
    rules:
      - name: attendance_range
        expression: attendance_rate_pct >= 0 and attendance_rate_pct <= 100
      - name: attendance_counts
        expression: total_raids_tracked >= raids_present and total_raids_tracked >= 0
