dataContractSpecification: 0.9.2
id: sc-analytics.dashboard_assets.player_survivability_rankings
info:
  title: Player Survivability Rankings Dashboard Asset
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  player_survivability_rankings:
    type: table
    primaryKey:
    - player_identity_key
    - zone_name
    - boss_name
    - difficulty_label
    fields:
      player_identity_key:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      player_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      player_class:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      zone_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      encounter_id:
        type: integer
        required: false
        nullable: true
      boss_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      difficulty:
        type: integer
        required: false
        nullable: true
      difficulty_label:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      deaths:
        type: integer
        required: true
        nullable: false
      kills:
        type: integer
        required: true
        nullable: false
      deaths_per_kill:
        type: number
        required: true
        nullable: false
      survivability_rank:
        type: integer
        required: true
        nullable: false
      survivability_rank_total:
        type: integer
        required: true
        nullable: false
      survivability_rank_percentile:
        type: number
        required: true
        nullable: false
x-sc-analytics:
  dashboardAsset:
    dataset: player_survivability_rankings
    sourceTable: 03_gold.sc_analytics.gold_player_survivability_rankings
    publishedPath: player_survivability_rankings.json
    grain: One row per player and stable player-detail display scope.
    consumers:
    - frontend static dashboard
    rules:
    - name: rank_bounds
      expression: survivability_rank >= 1 and survivability_rank <= survivability_rank_total
