dataContractSpecification: 0.9.2
id: sc-analytics.dashboard_assets.guild_roster
info:
  title: Guild Roster Dashboard Asset
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  guild_roster:
    type: table
    primaryKey:
    - name
    - realm
    fields:
      name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      player_class:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      realm:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      rank:
        type: integer
        required: true
        nullable: false
      rank_label:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      rank_category:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      is_raid_team:
        type: boolean
        required: true
        nullable: false
      is_active:
        type: boolean
        required: true
        nullable: false
      total_raids_tracked:
        type: integer
        required: true
        nullable: false
      raids_present:
        type: integer
        required: true
        nullable: false
      attendance_rate_pct:
        type: number
        required: true
        nullable: false
      last_raid_date:
        type: date
        required: false
        nullable: true
      first_raid_date:
        type: date
        required: false
        nullable: true
x-sc-analytics:
  dashboardAsset:
    dataset: guild_roster
    sourceTable: 03_gold.sc_analytics.gold_guild_roster
    publishedPath: guild_roster.json
    grain: One row per guild roster character.
    consumers:
    - frontend static dashboard
