dataContractSpecification: 0.9.2
id: sc-analytics.dashboard_assets.progression_timeline
info:
  title: Progression Timeline Dashboard Asset
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  progression_timeline:
    type: table
    primaryKey:
    - encounter_id
    - difficulty
    fields:
      encounter_id:
        type: integer
        required: true
        nullable: false
      boss_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      zone_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      difficulty:
        type: integer
        required: true
        nullable: false
      difficulty_label:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      raid_night_date:
        type: date
        required: true
        nullable: false
      cumulative_kills:
        type: integer
        required: true
        nullable: false
x-sc-analytics:
  dashboardAsset:
    dataset: progression_timeline
    sourceTable: 03_gold.sc_analytics.gold_progression_timeline
    publishedPath: progression_timeline.json
    grain: One row per first kill contributing to cumulative progression timeline.
    consumers:
    - frontend static dashboard
