dataContractSpecification: 0.9.2
id: sc-analytics.dashboard_assets.player_mplus_score_history
info:
  title: Player Mythic Plus Score History Dashboard Asset
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  player_mplus_score_history:
    type: table
    primaryKey:
