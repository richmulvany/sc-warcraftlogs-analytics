      best_run_short_name:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      best_run_level:
        type: integer
        required: false
        nullable: true
      best_run_score:
        type: number
        required: false
        nullable: true
      best_run_timed:
        type: boolean
        required: false
        nullable: true
      best_run_completed_at:
        type: timestamp
        required: false
        nullable: true
      best_run_url:
        type: string
        required: false
        nullable: true
        allowEmpty: true
x-sc-analytics:
  dashboardAsset:
    dataset: player_mplus_summary
    sourceTable: 03_gold.sc_analytics.gold_player_mplus_summary
    publishedPath: player_mplus_summary.json
    grain: One row per player identity, region, and Raider.IO season.
    consumers:
    - frontend static dashboard
    rules:
    - name: runs_add_up
      expression: total_runs == timed_runs + untimed_runs
