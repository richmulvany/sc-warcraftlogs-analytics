    - region
    - season
    fields:
      player_identity_key:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      player_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      realm_slug:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      region:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      profile_url:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      season:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      snapshot_at:
        type: timestamp
        required: true
        nullable: false
      score_all:
        type: number
        required: true
        nullable: true
      score_dps:
        type: number
        required: false
        nullable: true
      score_healer:
        type: number
        required: false
        nullable: true
      score_tank:
        type: number
        required: false
        nullable: true
      world_rank:
        type: integer
        required: false
        nullable: true
      region_rank:
        type: integer
        required: false
        nullable: true
      realm_rank:
        type: integer
        required: false
        nullable: true
      guild_mplus_rank:
        type: integer
        required: false
        nullable: true
      guild_mplus_rank_total:
        type: integer
        required: true
        nullable: false
      guild_mplus_rank_percentile:
        type: number
        required: false
        nullable: true
      total_runs:
        type: integer
        required: true
        nullable: false
      timed_runs:
        type: integer
        required: true
        nullable: false
      untimed_runs:
        type: integer
        required: true
        nullable: false
      highest_timed_level:
        type: integer
        required: false
        nullable: true
      highest_untimed_level:
        type: integer
        required: false
        nullable: true
      most_common_key_level:
        type: integer
        required: false
        nullable: true
