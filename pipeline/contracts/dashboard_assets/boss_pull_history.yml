dataContractSpecification: 0.9.2
id: sc-analytics.dashboard_assets.boss_pull_history
info:
  title: Boss Pull History Dashboard Asset
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  boss_pull_history:
    type: table
    primaryKey:
    - report_code
    - fight_id
    fields:
      encounter_id:
        type: integer
        required: true
        nullable: false
      boss_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      zone_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      difficulty:
        type: integer
        required: true
        nullable: false
      difficulty_label:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      raid_night_date:
        type: date
        required: true
        nullable: false
      report_code:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      report_title:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      start_time_utc:
        type: timestamp
        required: false
        nullable: true
      end_time_utc:
        type: timestamp
        required: false
        nullable: true
      fight_id:
        type: integer
        required: true
        nullable: false
      is_kill:
        type: boolean
        required: true
        nullable: false
      boss_percentage:
        type: number
        required: false
        nullable: true
      boss_hp_remaining:
        type: number
        required: false
        nullable: true
      duration_seconds:
        type: number
        required: false
        nullable: true
      last_phase:
        type: integer
        required: false
        nullable: true
x-sc-analytics:
  dashboardAsset:
    dataset: boss_pull_history
    sourceTable: 03_gold.sc_analytics.gold_boss_pull_history
    publishedPath: boss_pull_history.json
    grain: One row per tracked boss pull.
    consumers:
    - frontend static dashboard
