dataContractSpecification: 0.9.2
id: sc-analytics.gold.gold_raid_summary
info:
  title: Gold Raid Summary
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  gold_raid_summary:
    type: table
    primaryKey:
    - report_code
    fields:
      report_code:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      report_title:
        type: string
        required: true
        nullable: false
        allowEmpty: true
      start_time_utc:
        type: timestamp
        required: false
        nullable: true
      end_time_utc:
        type: timestamp
        required: false
        nullable: true
      zone_id:
        type: integer
        required: false
        nullable: true
      zone_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      raid_night_date:
        type: date
        required: true
        nullable: false
      primary_difficulty:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      total_pulls:
        type: integer
        required: true
        nullable: false
      boss_kills:
        type: integer
        required: true
        nullable: false
      total_wipes:
        type: integer
        required: true
        nullable: false
      total_fight_seconds:
        type: number
        required: true
        nullable: false
      unique_bosses_engaged:
        type: integer
        required: true
        nullable: false
      unique_bosses_killed:
        type: integer
        required: true
        nullable: false
x-sc-analytics:
  goldProduct:
    table: 03_gold.sc_analytics.gold_raid_summary
    model: gold_raid_summary
    grain: One row per WarcraftLogs report.
    downstream:
      dashboardAssets:
      - raid_summary
    rules:
    - name: pull_counts
      expression: total_pulls == boss_kills + total_wipes and total_pulls >= 0
