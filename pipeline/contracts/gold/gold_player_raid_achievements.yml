dataContractSpecification: 0.9.2
id: sc-analytics.gold.gold_player_raid_achievements
info:
  title: Gold Player Raid Achievements
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  gold_player_raid_achievements:
    type: table
    primaryKey:
    - player_identity_key
    - achievement_id
    - completed_timestamp
    fields:
      player_identity_key:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      player_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      realm_slug:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      achievement_id:
        type: integer
        required: true
        nullable: false
      achievement_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      completed_timestamp:
        type: integer
        required: true
        nullable: false
x-sc-analytics:
  chatbotTier: secondary
  goldProduct:
    table: 03_gold.sc_analytics.gold_player_raid_achievements
    model: gold_player_raid_achievements
    grain: One row per completed raid feat achievement for a character.
    downstream:
      dashboardAssets:
      - player_raid_achievements
