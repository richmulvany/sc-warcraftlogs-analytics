dataContractSpecification: 0.9.2
id: sc-analytics.gold.gold_boss_wipe_analysis
info:
  title: Gold Boss Wipe Analysis
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  gold_boss_wipe_analysis:
    type: table
    primaryKey:
    - encounter_id
    - zone_name
    - difficulty
    fields:
      encounter_id:
        type: integer
        required: true
        nullable: false
      boss_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      zone_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      difficulty:
        type: integer
        required: true
        nullable: false
      difficulty_label:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      total_wipes:
        type: integer
        required: true
        nullable: false
      best_wipe_pct:
        type: number
        required: false
        nullable: true
      avg_wipe_pct:
        type: number
        required: false
        nullable: true
      avg_last_phase:
        type: number
        required: false
        nullable: true
      max_phase_reached:
        type: integer
        required: false
        nullable: true
      avg_wipe_duration_seconds:
        type: number
        required: false
        nullable: true
      longest_wipe_seconds:
        type: number
        required: false
        nullable: true
      first_wipe_date:
        type: date
        required: false
        nullable: true
      latest_wipe_date:
        type: date
        required: false
        nullable: true
      raid_nights_attempted:
        type: integer
        required: true
        nullable: false
      avg_wipe_pct_rounded:
        type: number
        required: false
        nullable: true
x-sc-analytics:
  goldProduct:
    table: 03_gold.sc_analytics.gold_boss_wipe_analysis
    model: gold_boss_wipe_analysis
    grain: One row per boss encounter and difficulty with tracked wipes.
    downstream:
      dashboardAssets:
      - boss_wipe_analysis
