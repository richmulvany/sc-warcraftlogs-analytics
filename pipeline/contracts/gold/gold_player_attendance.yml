dataContractSpecification: 0.9.2
id: sc-analytics.gold.gold_player_attendance
info:
  title: Gold Player Attendance
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  gold_player_attendance:
    type: table
    primaryKey:
    - player_identity_key
    fields:
      player_identity_key:
        description: "Lowercase `player_name:player_class:player_realm` identity key"
        type: string
        required: true
        nullable: false
        allowEmpty: false
      player_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      player_class:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      player_realm:
        description: "Realm resolved from WCL actor roster, or `unknown`"
        type: string
        required: true
        nullable: false
        allowEmpty: false
      total_raids_tracked:
        description: "Total report count"
        type: integer
        required: true
        nullable: false
      raids_present:
        description: "Reports with presence = 1"
        type: integer
        required: true
        nullable: false
      raids_benched:
        description: "Reports with presence = 2"
        type: integer
        required: true
        nullable: false
      raids_absent:
        description: "Reports with presence = 3"
        type: integer
        required: true
        nullable: false
      last_raid_date:
        type: date
        required: false
        nullable: true
      first_raid_date:
        type: date
        required: false
        nullable: true
      zones_attended:
        description: "Distinct zones attended"
        type: array
        required: false
        nullable: true
      attendance_rate_pct:
        description: "raids_present / total × 100"
        type: number
        required: true
        nullable: false
x-sc-analytics:
  chatbotTier: secondary
  goldProduct:
    table: 03_gold.sc_analytics.gold_player_attendance
    model: gold_player_attendance
    grain: One row per player identity for attendance across tracked raids.
    downstream:
      dashboardAssets:
      - player_attendance
    rules:
    - name: attendance_range
      expression: attendance_rate_pct >= 0 and attendance_rate_pct <= 100
