dataContractSpecification: 0.9.2
id: sc-analytics.gold.gold_player_performance_summary
info:
  title: Gold Player Performance Summary
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  gold_player_performance_summary:
    type: table
    primaryKey:
    - player_identity_key
    - role
    fields:
      player_identity_key:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      player_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      player_class:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      realm:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      role:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      primary_spec:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      kills_tracked:
        type: integer
        required: true
        nullable: false
      avg_throughput_per_second:
        type: number
        required: true
        nullable: true
      best_throughput_per_second:
        type: number
        required: true
        nullable: true
      avg_rank_percent:
        type: number
        required: false
        nullable: true
      best_rank_percent:
        type: number
        required: false
        nullable: true
      avg_item_level:
        type: number
        required: false
        nullable: true
      last_seen_date:
        type: date
        required: false
        nullable: true
x-sc-analytics:
  goldProduct:
    table: 03_gold.sc_analytics.gold_player_performance_summary
    model: gold_player_performance_summary
    grain: One row per player identity and role.
    downstream:
      dashboardAssets:
      - player_performance_summary
