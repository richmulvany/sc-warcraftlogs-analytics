dataContractSpecification: 0.9.2
id: sc-analytics.gold.gold_player_mplus_score_history
info:
  title: Gold Player Mythic Plus Score History
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  gold_player_mplus_score_history:
    type: table
    primaryKey:
    - player_identity_key
    - region
    - season
    - snapshot_at
    fields:
      player_identity_key:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      player_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      realm_slug:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      region:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      profile_url:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      season:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      snapshot_at:
        type: timestamp
        required: true
        nullable: false
      snapshot_date:
        type: date
        required: true
        nullable: false
      score_all:
        type: number
        required: false
        nullable: true
      score_dps:
        type: number
        required: false
        nullable: true
      score_healer:
        type: number
        required: false
        nullable: true
      score_tank:
        type: number
        required: false
        nullable: true
      world_rank:
        type: integer
        required: false
        nullable: true
      region_rank:
        type: integer
        required: false
        nullable: true
      realm_rank:
        type: integer
        required: false
        nullable: true
      raiderio_last_crawled_at:
        type: timestamp
        required: false
        nullable: true
x-sc-analytics:
  goldProduct:
    table: 03_gold.sc_analytics.gold_player_mplus_score_history
    model: gold_player_mplus_score_history
    grain: One row per Raider.IO player score snapshot.
    downstream:
      dashboardAssets:
      - player_mplus_score_history
