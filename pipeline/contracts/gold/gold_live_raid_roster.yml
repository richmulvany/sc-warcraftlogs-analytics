  version: 0.1.0
  status: active
  owner: richmulvany
models:
  gold_live_raid_roster:
    type: table
    primaryKey:
    - name
    fields:
      name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      roster_rank:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      player_class:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      race:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      note:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      source_refreshed_at:
        type: timestamp
        required: false
        nullable: true
x-sc-analytics:
  goldProduct:
    table: 03_gold.sc_analytics.gold_live_raid_roster
    model: gold_live_raid_roster
    grain: One row per active live raid roster entry from Google Sheets.
    downstream:
      dashboardAssets:
      - live_raid_roster
