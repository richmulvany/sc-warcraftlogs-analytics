dataContractSpecification: 0.9.2
id: sc-analytics.gold.gold_boss_progression
info:
  title: Gold Boss Progression
  version: 0.2.0
  status: active
  owner: richmulvany
  description: >-
    Per-encounter, per-difficulty progression rollup. Includes total pulls,
    kills, wipes, best kill time, and a wipe-to-kill ratio for each boss the
    guild has engaged. Use this as the primary progression scoreboard. For
    raid-night-level rollups use gold_raid_summary; for per-pull detail use
    gold_boss_pull_history; for wipe-only diagnosis use gold_boss_wipe_analysis.
models:
  gold_boss_progression:
    type: table
    description: One row per (encounter, boss, zone, difficulty) progression rollup.
    primaryKey:
    - encounter_id
    - boss_name
    - zone_id
    - zone_name
    - difficulty
    fields:
      encounter_id:
        description: "Stable WCL encounter identifier."
        type: integer
        required: true
        nullable: false
      boss_name:
        description: "Boss name."
        type: string
        required: true
        nullable: false
        allowEmpty: false
      zone_id:
        description: "WCL zone identifier."
        type: integer
        required: true
        nullable: false
      zone_name:
        description: "Raid zone name."
        type: string
        required: true
        nullable: false
        allowEmpty: false
      difficulty:
        description: "Difficulty integer (3=Normal, 4=Heroic, 5=Mythic)."
        type: integer
        required: true
        nullable: false
        enum: [3, 4, 5]
      difficulty_label:
        description: "Human-readable difficulty."
        type: string
        required: true
        nullable: false
        allowEmpty: false
        enum: [Normal, Heroic, Mythic]
      total_pulls:
        description: "Total pulls (kills + wipes)."
        type: integer
        required: true
        nullable: false
        unit: count
      total_kills:
        description: "Number of successful kills."
        type: integer
        required: true
        nullable: false
        unit: count
      total_wipes:
        description: "Number of wipes."
        type: integer
        required: true
        nullable: false
        unit: count
      best_kill_seconds:
        description: "Fastest kill duration recorded; null if never killed."
        type: number
        required: false
        nullable: true
        unit: seconds
      avg_pull_duration_seconds:
        description: "Average pull duration across all pulls (kills and wipes)."
        type: number
        required: false
        nullable: true
        unit: seconds
      is_killed:
        description: "Whether the boss has ever been killed at this difficulty."
        type: boolean
        required: false
        nullable: true
      first_kill_date:
        description: "Date of the first kill at this difficulty; null if never killed."
        type: date
        required: false
        nullable: true
      last_attempt_date:
        description: "Date of the most recent attempt (kill or wipe)."
        type: date
        required: false
        nullable: true
      wipe_to_kill_ratio:
        description: "total_wipes / max(total_kills, 1) — higher means more attempts per kill."
        type: number
        required: true
        nullable: false
        unit: ratio
x-sc-analytics:
  chatbotTier: primary
  aiSummary: >-
    Per-encounter progression scoreboard. Rows show how many pulls/kills/wipes
    per boss-difficulty pair, with best kill time and wipe ratio. Filter by
    difficulty_label and zone_name for tier-specific views.
  exampleQuestions:
    - Which bosses have we killed on Mythic?
    - Which bosses are we wiping on most?
    - Show progression on the current tier ordered by wipe-to-kill ratio.
    - When did we first kill <boss> on Heroic?
    - Which Mythic bosses have we attempted but not killed?
  metrics:
    - name: wipe_to_kill_ratio
      definition: total_wipes / max(total_kills, 1).
      unit: ratio
      caveats: For unkilled bosses, denominator is 1, so the ratio equals total_wipes.
    - name: best_kill_seconds
      definition: Fastest successful kill at this difficulty.
      unit: seconds
      caveats: Null when the boss has never been killed at this difficulty.
  joinKeys:
    - column: encounter_id
      joinsTo: gold_encounter_catalog.encounter_id
      cardinality: many-to-one
    - column: zone_id
      joinsTo: gold_encounter_catalog.zone_id
      cardinality: many-to-one
  notRecommendedFor:
    - Per-night attendance — use gold_raid_summary or gold_player_attendance.
    - Per-pull mechanics analysis — use gold_boss_pull_history or gold_boss_mechanics.
    - Player-level diagnosis — this table has no player columns.
  goldProduct:
    table: 03_gold.sc_analytics.gold_boss_progression
    model: gold_boss_progression
    grain: One row per encounter, boss, zone, and difficulty.
    downstream:
      dashboardAssets:
      - boss_progression
    rules:
    - name: valid_difficulty
      field: difficulty_label
      enum:
      - Normal
      - Heroic
      - Mythic
    - name: pull_counts
      expression: total_pulls == total_kills + total_wipes
