dataContractSpecification: 0.9.2
id: sc-analytics.gold.gold_boss_progression
info:
  title: Gold Boss Progression
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  gold_boss_progression:
    type: table
    primaryKey:
    - encounter_id
    - boss_name
    - zone_id
    - zone_name
    - difficulty
    fields:
      encounter_id:
        type: integer
        required: true
        nullable: false
      boss_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      zone_id:
        type: integer
        required: true
        nullable: false
      zone_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      difficulty:
        type: integer
        required: true
        nullable: false
      difficulty_label:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      total_pulls:
        type: integer
        required: true
        nullable: false
      total_kills:
        type: integer
        required: true
        nullable: false
      total_wipes:
        type: integer
        required: true
        nullable: false
      best_kill_seconds:
        type: number
        required: false
        nullable: true
      avg_pull_duration_seconds:
        type: number
        required: false
        nullable: true
      is_killed:
        type: boolean
        required: false
        nullable: true
      first_kill_date:
        type: date
        required: false
        nullable: true
      last_attempt_date:
        type: date
        required: false
        nullable: true
      wipe_to_kill_ratio:
        type: number
        required: true
        nullable: false
x-sc-analytics:
  goldProduct:
    table: 03_gold.sc_analytics.gold_boss_progression
    model: gold_boss_progression
    grain: One row per encounter, boss, zone, and difficulty.
    downstream:
      dashboardAssets:
      - boss_progression
    rules:
    - name: valid_difficulty
      field: difficulty_label
      enum:
      - Normal
      - Heroic
      - Mythic
    - name: pull_counts
      expression: total_pulls == total_kills + total_wipes
