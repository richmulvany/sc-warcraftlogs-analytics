dataContractSpecification: 0.9.2
id: sc-analytics.gold.gold_player_mplus_weekly_activity
info:
  title: Gold Player Mythic Plus Weekly Activity
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  gold_player_mplus_weekly_activity:
    type: table
    primaryKey:
    - player_identity_key
    - region
    - season
    - week_start
    fields:
      player_identity_key:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      player_name:
        description: "Character name"
        type: string
        required: true
        nullable: false
        allowEmpty: false
      realm_slug:
        description: "Realm slug"
        type: string
        required: true
        nullable: false
        allowEmpty: false
      region:
        description: "Raider.IO region"
        type: string
        required: true
        nullable: false
        allowEmpty: false
      season:
        description: "Season identifier"
        type: string
        required: true
        nullable: false
        allowEmpty: false
      week_start:
        description: "Week start date"
        type: date
        required: true
        nullable: false
      total_runs:
        description: "Runs in week"
        type: integer
        required: true
        nullable: false
      timed_runs:
        description: "Timed runs in week"
        type: integer
        required: true
        nullable: false
      untimed_runs:
        description: "Untimed runs in week"
        type: integer
        required: true
        nullable: false
      highest_key_level:
        description: "Highest key level completed that week"
        type: integer
        required: false
        nullable: true
      unique_dungeons:
        description: "Distinct dungeons completed that week"
        type: integer
        required: true
        nullable: false
      most_common_key_level:
        description: "Most common key level that week"
        type: integer
        required: false
        nullable: true
x-sc-analytics:
  chatbotTier: secondary
  goldProduct:
    table: 03_gold.sc_analytics.gold_player_mplus_weekly_activity
    model: gold_player_mplus_weekly_activity
    grain: One row per player, region, season, and Mythic+ week.
    downstream:
      dashboardAssets:
      - player_mplus_weekly_activity
