dataContractSpecification: 0.9.2
id: sc-analytics.gold.gold_boss_mechanics
info:
  title: Gold Boss Mechanics
  version: 0.2.0
  status: active
  owner: richmulvany
  description: >-
    Per-(encounter, difficulty) wipe-mechanics breakdown. Reports the share of
    wipes by phase bucket (P1, P2, P3+), wipes by duration bucket
    (<1m, 1–3m, 3–5m, 5m+), and a progress_trend that compares the last week
    average wipe HP% to the all-time average. Use for "where are we wiping
    on this boss" (phase) and "are we improving" (trend).
models:
  gold_boss_mechanics:
    type: table
    description: One row per (encounter, difficulty) wipe mechanics rollup.
    primaryKey:
    - encounter_id
    - boss_name
    - zone_name
    - difficulty
    - difficulty_label
    fields:
      encounter_id:
        description: "Stable WCL encounter identifier."
        type: integer
        required: true
        nullable: false
      boss_name:
        description: "Boss name."
        type: string
        required: true
        nullable: false
        allowEmpty: false
      zone_name:
        description: "Raid zone name."
        type: string
        required: true
        nullable: false
        allowEmpty: false
      difficulty:
        description: "Difficulty integer (3=Normal, 4=Heroic, 5=Mythic)."
        type: integer
        required: true
        nullable: false
        enum: [3, 4, 5]
      difficulty_label:
        description: "Human-readable difficulty."
        type: string
        required: true
        nullable: false
        allowEmpty: false
        enum: [Normal, Heroic, Mythic]
      total_wipes:
        description: "Total wipes counted in this rollup."
        type: integer
        required: true
        nullable: false
        unit: count
      avg_boss_pct:
        description: "Average boss HP% remaining at wipe (closer to 0 = closer to a kill)."
        type: number
        required: false
        nullable: true
        unit: percent_0_100
      pct_wipes_phase_1:
        description: "Share of wipes (0–100) that ended in phase 1."
        type: number
        required: true
        nullable: false
        unit: percent_0_100
      pct_wipes_phase_2:
        description: "Share of wipes (0–100) that ended in phase 2."
        type: number
        required: true
        nullable: false
        unit: percent_0_100
      pct_wipes_phase_3_plus:
        description: "Share of wipes (0–100) that ended in phase 3 or later."
        type: number
        required: true
        nullable: false
        unit: percent_0_100
      wipes_lt_1min:
        description: "Wipes shorter than 1 minute."
        type: integer
        required: true
        nullable: false
        unit: count
      wipes_1_3min:
        description: "Wipes between 1 and 3 minutes."
        type: integer
        required: true
        nullable: false
        unit: count
      wipes_3_5min:
        description: "Wipes between 3 and 5 minutes."
        type: integer
        required: true
        nullable: false
        unit: count
      wipes_5plus_min:
        description: "Wipes 5 minutes or longer."
        type: integer
        required: true
        nullable: false
        unit: count
      last_week_avg_boss_pct:
        description: "Average wipe boss HP% over the last 7 days; null when no recent wipes."
        type: number
        required: false
        nullable: true
        unit: percent_0_100
      progress_trend:
        description: "all-time avg_boss_pct minus last_week_avg_boss_pct; positive = recent wipes are closer to kill."
        type: number
        required: false
        nullable: true
        unit: percent_0_100
x-sc-analytics:
  chatbotTier: primary
  aiSummary: >-
    Per-encounter wipe diagnosis. Use for "which phase do we wipe in most",
    "are we trending closer to a kill on <boss>", or "do we have lots of
    fast/early wipes". Pair with gold_boss_wipe_analysis for HP% and best-pull
    detail.
  exampleQuestions:
    - Which phase are we wiping in most on Mythic <boss>?
    - Are we improving on <boss> this week?
    - Which bosses have the most fast (<1 minute) wipes?
    - What share of <boss> wipes reach phase 3?
  metrics:
    - name: progress_trend
      definition: avg_boss_pct minus last_week_avg_boss_pct.
      unit: percent_0_100
      caveats: Positive = recent wipes are closer to kill. Null when there are no last-week wipes; do not interpret null as "no progress".
  joinKeys:
    - column: encounter_id
      joinsTo: gold_encounter_catalog.encounter_id
      cardinality: many-to-one
    - column: encounter_id
      joinsTo: gold_boss_progression.encounter_id
      cardinality: many-to-one
    - column: encounter_id
      joinsTo: gold_boss_wipe_analysis.encounter_id
      cardinality: many-to-one
  notRecommendedFor:
    - Counting kills — this is wipe-only.
    - Player-level analysis — no player columns.
    - Comparing absolute wipe counts across bosses with vastly different attempt counts (use ratios).
  goldProduct:
    table: 03_gold.sc_analytics.gold_boss_mechanics
    model: gold_boss_mechanics
    grain: One row per boss encounter, boss name, zone, and difficulty with wipe mechanics metrics.
    downstream:
      dashboardAssets:
      - boss_mechanics
