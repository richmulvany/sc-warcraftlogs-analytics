dataContractSpecification: 0.9.2
id: sc-analytics.gold.gold_boss_mechanics
info:
  title: Gold Boss Mechanics
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  gold_boss_mechanics:
    type: table
    primaryKey:
    - encounter_id
    - boss_name
    - zone_name
    - difficulty
    - difficulty_label
    fields:
      encounter_id:
        type: integer
        required: true
        nullable: false
      boss_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      zone_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      difficulty:
        type: integer
        required: true
        nullable: false
      difficulty_label:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      total_wipes:
        type: integer
        required: true
        nullable: false
      avg_boss_pct:
        type: number
        required: false
        nullable: true
      pct_wipes_phase_1:
        type: number
        required: true
        nullable: false
      pct_wipes_phase_2:
        type: number
        required: true
        nullable: false
      pct_wipes_phase_3_plus:
        type: number
        required: true
        nullable: false
      wipes_lt_1min:
        type: integer
        required: true
        nullable: false
      wipes_1_3min:
        type: integer
        required: true
        nullable: false
      wipes_3_5min:
        type: integer
        required: true
        nullable: false
      wipes_5plus_min:
        type: integer
        required: true
        nullable: false
      last_week_avg_boss_pct:
        type: number
        required: false
        nullable: true
      progress_trend:
        type: number
        required: false
        nullable: true
x-sc-analytics:
  goldProduct:
    table: 03_gold.sc_analytics.gold_boss_mechanics
    model: gold_boss_mechanics
    grain: One row per boss encounter, boss name, zone, and difficulty with wipe mechanics metrics.
    downstream:
      dashboardAssets:
      - boss_mechanics
