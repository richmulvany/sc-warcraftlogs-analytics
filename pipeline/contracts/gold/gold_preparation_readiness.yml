dataContractSpecification: 0.9.2
id: sc-analytics.gold.gold_preparation_readiness
info:
  title: Gold Preparation Readiness
  version: 0.2.0
  status: active
  owner: richmulvany
  description: >-
    Per-raider current-tier preparation scoreboard. Combines food, flask/phial,
    weapon-enhancement, and combat-potion coverage on kill fights into a 0–100
    readiness_score with a categorical readiness_label (watch/steady/strong)
    and a `weakest_signal_label` indicating where to improve. Combat-potion
    usage is displayed for all roles but contributes to scoring only for DPS
    (per project convention). Scope is current tier only — historical
    consumable usage lives in fact_player_fight_performance.
models:
  gold_preparation_readiness:
    type: table
    description: One row per current raid-team preparation identity.
    primaryKey:
    - identity_key
    fields:
      identity_key:
        description: "Character or published override identity key"
        type: string
        required: true
        nullable: false
        allowEmpty: false
      player_name:
        description: "Display name"
        type: string
        required: true
        nullable: false
        allowEmpty: false
      player_class:
        description: "Latest known class or roster class"
        type: string
        required: true
        nullable: false
        allowEmpty: false
      role:
        description: "Player role at current tier."
        type: string
        required: true
        nullable: false
        allowEmpty: false
        enum: [dps, healer, tank, unknown]
      rank_label:
        description: "Roster rank label"
        type: string
        required: false
        nullable: true
        allowEmpty: true
      is_active:
        description: "Active roster flag"
        type: boolean
        required: true
        nullable: false
      current_tier:
        description: "Current raid tier"
        type: string
        required: true
        nullable: false
        allowEmpty: false
      roster_source:
        description: "Source roster used to generate this row."
        type: string
        required: true
        nullable: false
        allowEmpty: false
        enum: [live_raid_roster, gold_raid_team]
      has_current_tier_data:
        description: "Whether current-tier kill rows exist"
        type: boolean
        required: true
        nullable: false
      attendance_rate_pct:
        description: "Current-tier raid nights present / raid nights tracked × 100"
        type: number
        required: true
        nullable: false
        unit: percent_0_100
      raids_present:
        description: "Current-tier raid nights with at least one kill row"
        type: integer
        required: true
        nullable: false
      total_raids_tracked:
        description: "Current-tier raid nights tracked"
        type: integer
        required: true
        nullable: false
      kills_tracked:
        description: "Current-tier boss kill rows"
        type: integer
        required: true
        nullable: false
      food_rate:
        description: "Share (0–1) of current-tier kill fights with a recognised food buff."
        type: number
        required: true
        nullable: false
        unit: ratio_0_1
      flask_rate:
        description: "Share (0–1) of current-tier kill fights with a flask or phial."
        type: number
        required: true
        nullable: false
        unit: ratio_0_1
      weapon_rate:
        description: "Share (0–1) of current-tier kill fights with a weapon enhancement applied."
        type: number
        required: true
        nullable: false
        unit: ratio_0_1
      combat_potion_rate:
        description: "Share (0–1) of current-tier kill fights with a combat-potion cast (DPS-only signal for scoring; displayed for all roles)."
        type: number
        required: true
        nullable: false
        unit: ratio_0_1
      readiness_score:
        description: "0–100 readiness composite owned by Gold."
        type: number
        required: true
        nullable: false
        unit: score
      readiness_label:
        description: "Categorical readiness bucket."
        type: string
        required: true
        nullable: false
        allowEmpty: false
        enum: [watch, steady, strong]
      readiness_notes:
        description: "Pipe-delimited Gold-owned notes"
        type: string
        required: true
        nullable: false
        allowEmpty: true
      spec:
        description: "Most recent specialisation observed for this identity, or empty."
        type: string
        required: true
        nullable: false
        allowEmpty: true
      latest_avg_item_level:
        description: "Most recent equipped average item level."
        type: number
        required: true
        nullable: true
      latest_kill_date:
        description: "ISO date of the most recent current-tier kill, or empty if none."
        type: string
        required: true
        nullable: false
        allowEmpty: true
      weakest_signal_label:
        description: "Lowest preparation component label"
        type: string
        required: true
        nullable: false
        allowEmpty: true
      recent_food_names:
        description: "Latest non-empty current-tier food buff names, or empty string"
        type: string
        required: true
        nullable: false
        allowEmpty: true
      recent_flask_names:
        description: "Latest non-empty current-tier flask/phial names, or empty string"
        type: string
        required: true
        nullable: false
        allowEmpty: true
      recent_weapon_names:
        description: "Latest non-empty current-tier weapon enhancement names, or empty string"
        type: string
        required: true
        nullable: false
        allowEmpty: true
      recent_combat_potion_names:
        description: "Latest non-empty classified combat potion names. If potion usage exists but the event name is unavailable, `Combat potion used`; otherwise empty string"
        type: string
        required: true
        nullable: false
        allowEmpty: true
      character_names:
        description: "Pipe-delimited characters included in the identity"
        type: string
        required: true
        nullable: false
        allowEmpty: true
      override_label:
        description: "Identity-pool override applied to this row."
        type: string
        required: true
        nullable: false
        allowEmpty: true
        enum: ["", Replace, Pool]
x-sc-analytics:
  chatbotTier: primary
  aiSummary: >-
    Current-tier preparation scoreboard. Per-raider 0–100 readiness_score
    composed of food, flask/phial, weapon-enhancement, and (DPS-only) combat
    potion coverage on kill fights. Use for "who has poor consumable usage",
    "who is least prepared", or "what is player X's weakest consumable signal".
    Combat potions display for all roles but only contribute to scoring for DPS.
  exampleQuestions:
    - Who has poor consumable usage on the current tier?
    - Which raiders need to improve their flask/phial coverage?
    - List players in the `watch` readiness bucket.
    - What is player X's weakest preparation signal?
    - Who has the highest readiness_score this tier?
  metrics:
    - name: readiness_score
      definition: 0–100 composite of food, flask, weapon, and (DPS-only) combat-potion coverage on current-tier kills.
      unit: score
      caveats: Only kill fights are counted; players with no current-tier kills will have has_current_tier_data=false.
    - name: food_rate
      definition: Share of current-tier kills with a recognised food buff active.
      unit: ratio_0_1
    - name: flask_rate
      definition: Share of current-tier kills with a flask or phial active.
      unit: ratio_0_1
  joinKeys:
    - column: identity_key
      joinsTo: gold_player_attendance.player_identity_key
      cardinality: many-to-one
  notRecommendedFor:
    - Historical (cross-tier) consumable usage — use fact_player_fight_performance.
    - Wipe-side discipline — use gold_wipe_survival_discipline (defensives, healthstones, potions on wipes).
    - Counting raid attendance independently — use gold_player_attendance.
  goldProduct:
    table: 03_gold.sc_analytics.gold_preparation_readiness
    model: gold_preparation_readiness
    grain: One row per current raid-team preparation identity.
    downstream:
      dashboardAssets:
      - preparation_readiness
    rules:
    - name: valid_readiness_label
      field: readiness_label
      enum:
      - watch
      - steady
      - strong
    - name: score_range
      expression: readiness_score >= 0 and readiness_score <= 100
