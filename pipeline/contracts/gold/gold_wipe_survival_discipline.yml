x-sc-analytics:
  goldProduct:
    table: 03_gold.sc_analytics.gold_wipe_survival_discipline
    model: gold_wipe_survival_discipline
    grain: One row per player and stable Wipe Analysis dashboard scope.
    downstream:
      dashboardAssets:
      - wipe_survival_discipline
    rules:
    - name: valid_defensive_tracking_status
      field: defensive_tracking_status
      enum:
      - tracked_used
      - tracked_zero_usage
      - no_tracked_capacity
      - unknown
    - name: score_range
      expression: survival_discipline_score >= 0 and survival_discipline_score <= 100 and survival_failure_score == survival_discipline_score
    - name: defensive_zero_usage_semantics
      expression: defensive_tracking_status != "tracked_zero_usage" or defensive_usage_rate == 0
