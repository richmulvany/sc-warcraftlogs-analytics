dataContractSpecification: 0.9.2
id: sc-analytics.gold.dim_player
info:
  title: Dim Player
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  dim_player:
    type: table
    primaryKey:
    - player_name
    fields:
      player_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      player_class:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      realm:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      is_guild_member:
        type: boolean
        required: true
        nullable: false
      rank:
        type: integer
        required: false
        nullable: true
      rank_label:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      rank_category:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      is_raid_team:
        type: boolean
        required: true
        nullable: false
      first_seen_date:
        type: date
        required: false
        nullable: true
      last_seen_date:
        type: date
        required: false
        nullable: true
x-sc-analytics:
  goldProduct:
    table: 03_gold.sc_analytics.dim_player
    model: dim_player
    grain: One row per canonical player name observed in WCL logs, enriched with guild metadata when available.
    downstream:
      dashboardAssets: []
