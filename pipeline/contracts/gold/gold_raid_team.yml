dataContractSpecification: 0.9.2
id: sc-analytics.gold.gold_raid_team
info:
  title: Gold Raid Team
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  gold_raid_team:
    type: table
    primaryKey:
    - name
    - realm
    fields:
      name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      player_class:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      realm:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      rank:
        type: integer
        required: true
        nullable: false
      rank_label:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      rank_category:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      is_active:
        type: boolean
        required: true
        nullable: false
      total_raids_tracked:
        type: integer
        required: true
        nullable: false
      raids_present:
        type: integer
        required: true
        nullable: false
      attendance_rate_pct:
        type: number
        required: true
        nullable: false
      last_raid_date:
        type: date
        required: false
        nullable: true
      first_raid_date:
        type: date
        required: false
        nullable: true
      possible_main:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      has_possible_alt_in_logs:
        type: boolean
        required: true
        nullable: false
x-sc-analytics:
  goldProduct:
    table: 03_gold.sc_analytics.gold_raid_team
    model: gold_raid_team
    grain: One row per active raid team member.
    downstream:
      dashboardAssets:
      - raid_team
