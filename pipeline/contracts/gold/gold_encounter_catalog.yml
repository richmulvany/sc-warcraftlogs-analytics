dataContractSpecification: 0.9.2
id: sc-analytics.gold.gold_encounter_catalog
info:
  title: Gold Encounter Catalog
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  gold_encounter_catalog:
    type: table
    primaryKey:
    - zone_id
    - encounter_id
    fields:
      zone_id:
        type: integer
        required: true
        nullable: false
      zone_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      encounter_id:
        type: integer
        required: true
        nullable: false
      encounter_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      difficulty_names:
        type: array
        required: false
        nullable: true
x-sc-analytics:
  goldProduct:
    table: 03_gold.sc_analytics.gold_encounter_catalog
    model: gold_encounter_catalog
    grain: One row per active raid-zone encounter reference.
    downstream:
      dashboardAssets:
      - encounter_catalog
