dataContractSpecification: 0.9.2
id: sc-analytics.gold.fact_player_events
info:
  title: Fact Player Events
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  fact_player_events:
    type: table
    primaryKey:
    - report_code
    - fight_id
    - player_name
    - death_timestamp_ms
    fields:
      report_code:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      fight_id:
        type: integer
        required: true
        nullable: false
      player_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      player_class:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      death_timestamp_ms:
        type: integer
        required: true
        nullable: false
      overkill:
        type: number
        required: false
        nullable: true
      killing_blow_name:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      killing_blow_id:
        type: integer
        required: false
        nullable: true
      zone_name:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      zone_id:
        type: integer
        required: false
        nullable: true
      raid_night_date:
        type: date
        required: false
        nullable: true
x-sc-analytics:
  goldProduct:
    table: 03_gold.sc_analytics.fact_player_events
    model: fact_player_events
    grain: One row per player death event.
    downstream:
      dashboardAssets: []
