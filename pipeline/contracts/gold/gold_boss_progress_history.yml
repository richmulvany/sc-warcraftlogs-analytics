dataContractSpecification: 0.9.2
id: sc-analytics.gold.gold_boss_progress_history
info:
  title: Gold Boss Progress History
  version: 0.1.0
  status: active
  owner: richmulvany
models:
  gold_boss_progress_history:
    type: table
    primaryKey:
    - encounter_id
    - difficulty
    - report_code
    fields:
      encounter_id:
        type: integer
        required: true
        nullable: false
      boss_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      zone_name:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      difficulty:
        type: integer
        required: true
        nullable: false
      difficulty_label:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      raid_night_date:
        type: date
        required: true
        nullable: false
      report_code:
        type: string
        required: true
        nullable: false
        allowEmpty: false
      report_title:
        type: string
        required: false
        nullable: true
        allowEmpty: true
      start_time_utc:
        type: timestamp
        required: false
        nullable: true
      end_time_utc:
        type: timestamp
        required: false
        nullable: true
      pulls_on_night:
        type: integer
        required: true
        nullable: false
      kills_on_night:
        type: integer
        required: true
        nullable: false
      wipes_on_night:
        type: integer
        required: true
        nullable: false
      best_wipe_pct_on_night:
        type: number
        required: false
        nullable: true
      avg_wipe_pct_on_night:
        type: number
        required: false
        nullable: true
      best_boss_hp_remaining:
        type: number
        required: false
        nullable: true
      is_kill_on_night:
        type: boolean
        required: true
        nullable: false
      kill_duration_seconds:
        type: number
        required: false
        nullable: true
      longest_pull_seconds:
        type: number
        required: false
        nullable: true
x-sc-analytics:
  goldProduct:
    table: 03_gold.sc_analytics.gold_boss_progress_history
    model: gold_boss_progress_history
    grain: One row per report, boss encounter, and difficulty with nightly progression summary.
    downstream:
      dashboardAssets:
      - boss_progress_history
