# Databricks Asset Bundle configuration
# Docs: https://docs.databricks.com/dev-tools/bundles/index.html

bundle:
  name: medallion-pipeline

# Variables — override per target
variables:
  catalog:
    description: Unity Catalog name
    default: main
  schema:
    description: Schema (database) name
    default: pipeline_dev
  pipeline_name:
    description: DLT pipeline display name
    default: Medallion Pipeline
  service_principal_name:
    description: Service principal for production deployments
    default: your-sp@your-org.example.com

targets:
  development:
    mode: development
    default: true
    variables:
      schema: pipeline_dev

  production:
    mode: production
    variables:
      schema: pipeline_prod
    run_as:
      service_principal_name: ${var.service_principal_name}

resources:
  pipelines:
    medallion_pipeline:
      name: ${var.pipeline_name}
      catalog: ${var.catalog}
      schema: ${var.schema}

      # DLT notebook/file sources — list all pipeline files here
      libraries:
        - notebook:
            path: pipeline/bronze/raw_source.py
        - notebook:
            path: pipeline/silver/clean_entities.py
        - notebook:
            path: pipeline/silver/clean_reports.py
        - notebook:
            path: pipeline/gold/entity_summary.py
        - notebook:
            path: pipeline/gold/summary_products.py

      configuration:
        # Secrets are read via dbutils.secrets inside pipeline notebooks
        secret_scope: pipeline-secrets

      development: ${bundle.target == 'development'}

      channel: CURRENT    # Use the current DLT runtime

  jobs:
    nightly_ingestion:
      name: Nightly Ingestion
      schedule:
        quartz_cron_expression: "0 0 1 * * ?"   # 01:00 UTC daily
        timezone_id: UTC
      tasks:
        - task_key: ingest_primary
          notebook_task:
            notebook_path: ingestion/jobs/ingest_primary.py
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 0
