# Databricks Asset Bundle configuration
# Docs: https://docs.databricks.com/dev-tools/bundles/index.html

bundle:
  name: sc-analytics

sync:
  exclude:
    - frontend/**
    - .github/**
    - node_modules/**
    - "*.md"
    - LICENSE
    - .git/**
    - .venv/**
    - __pycache__/**
    - "*.pyc"
  paths:
    - pipeline
    - ingestion
    - scripts

variables:
  catalog:
    description: Unity Catalog name
    default: 04_sdp
  schema:
    description: Schema (database) name
    default: warcraftlogs
  pipeline_name:
    description: DLT pipeline display name
    default: WarcraftLogs Analytics
  developer_user:
    description: Email of the developer deploying in development mode
    default: ricard.mulvany@gmail.com
  guild_name:
    description: WoW guild name to ingest data for
    default: Student Council
  guild_server_slug:
    description: WoW realm slug (lowercase, hyphens for spaces)
    default: twisting-nether
  guild_server_region:
    description: WoW region (EU, US, KR, TW)
    default: EU
  profile_candidate_catalog:
    description: Catalog containing gold tables used to seed Blizzard / WCL zone-rank candidates
    default: 03_gold
  profile_candidate_schema:
    description: Schema containing gold tables used to seed Blizzard / WCL zone-rank candidates
    default: sc_analytics
  excluded_zone_names:
    description: Comma-separated zone names to skip in guild_zone_ranks ingestion
    default: ""
  live_roster_sheet_id:
    description: Google Sheets document id for the live raid roster (empty disables ingestion)
    default: "1fHtbnNTHrLVFqq5e7L7usN4qI4LGd1JKRKMdVuHnmRg"
  live_roster_sheet_gid:
    description: Sheet/gid within the live roster Google Sheets document
    default: "0"
  blizzard_profile_export_enabled:
    description: Enable Blizzard character media/equipment/achievements ingestion
    default: "true"
  blizzard_profile_export_cap:
    description: Cap on number of Blizzard character profile candidates per run (0 = no cap)
    default: "0"
  blizzard_profile_sleep_seconds:
    description: Throttle between Blizzard character profile API calls
    default: "0.05"
  guild_zone_ranks_enabled:
    description: Enable WCL guildData.zoneRanking ingestion
    default: "true"
  github_repo:
    description: GitHub repo (owner/repo) containing the publish workflow for dashboard assets (empty defaults to value of secret 'github_repo')
    default: "richmulvany/sc-warcraftlogs-analytics"

targets:
  development:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/sc-analytics/${bundle.target}
    variables:
      schema: warcraftlogs
    permissions:
    - user_name: ${var.developer_user}
      level: CAN_MANAGE
  production:
    mode: production
    default: false
    workspace:
      root_path: /Workspace/sc-analytics/${bundle.target}
    variables:
      schema: warcraftlogs
    permissions:
    - user_name: ${var.developer_user}
      level: CAN_MANAGE
    resources:
      pipelines:
        warcraftlogs_pipeline:
          development: false

resources:
  pipelines:
    warcraftlogs_pipeline:
      permissions:
        - user_name: ${var.developer_user}
          level: CAN_MANAGE
      name: ${var.pipeline_name}
      catalog: ${var.catalog}
      schema: ${var.schema}
      run_as:
        user_name: ${var.developer_user}
      serverless: true

      libraries:
        # Bronze — per-source Auto Loader notebooks publishing to 01_bronze.<source>.
        - notebook:
            path: pipeline/bronze/warcraftlogs.py
        - notebook:
            path: pipeline/bronze/blizzard.py
        - notebook:
            path: pipeline/bronze/raiderio.py
        - notebook:
            path: pipeline/bronze/google_sheets.py
        # Silver — per-source cleaning notebooks publishing to 02_silver.sc_analytics_<source>.
        - notebook:
            path: pipeline/silver/clean_reports.py
        - notebook:
            path: pipeline/silver/clean_attendance.py
        - notebook:
            path: pipeline/silver/clean_players.py
        - notebook:
            path: pipeline/silver/clean_zone_catalog.py
        - notebook:
            path: pipeline/silver/clean_guild_members.py
        - notebook:
            path: pipeline/silver/clean_rankings.py
        - notebook:
            path: pipeline/silver/clean_events.py
        - notebook:
            path: pipeline/silver/clean_raiderio.py
        - notebook:
            path: pipeline/silver/clean_guild_zone_ranks.py
        - notebook:
            path: pipeline/silver/clean_character_media.py
        - notebook:
            path: pipeline/silver/clean_character_equipment.py
        - notebook:
            path: pipeline/silver/clean_character_achievements.py
        - notebook:
            path: pipeline/silver/clean_live_raid_roster.py
        - notebook:
            path: pipeline/silver/clean_item_media.py
        # Gold — business-ready data products in 03_gold.sc_analytics.
        - notebook:
            path: pipeline/gold/summary_products.py
        - notebook:
            path: pipeline/gold/player_products.py
        - notebook:
            path: pipeline/gold/core_dimensions.py
        - notebook:
            path: pipeline/gold/core_facts.py
        - notebook:
            path: pipeline/gold/roster_products.py
        - notebook:
            path: pipeline/gold/survivability_products.py
        - notebook:
            path: pipeline/gold/mplus_products.py
        - notebook:
            path: pipeline/gold/utility_products.py
        - notebook:
            path: pipeline/gold/wipe_diagnostics.py
        - notebook:
            path: pipeline/gold/profile_products.py

      configuration:
        secret_scope: pipeline-secrets

      development: true
      channel: CURRENT

  jobs:
    migrate_bronze_landing_volumes:
      name: Migrate Bronze Landing Volumes
      tasks:
        - task_key: copy_landing
          notebook_task:
            notebook_path: ingestion/jobs/migrate_bronze_landing_volumes.py

    # ── Stage 1: ingestion ─────────────────────────────────────────────────────
    # Manually runnable for backfills. The daily 22:15 schedule lives on the
    # orchestrator (sc-analytics-daily-orchestrator), not here.
    ingestion_daily:
      name: sc-analytics-ingestion-daily-2215
      tasks:
        - task_key: ingest_primary
          notebook_task:
            notebook_path: ingestion/jobs/ingest_primary.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              guild_name: ${var.guild_name}
              guild_server_slug: ${var.guild_server_slug}
              guild_server_region: ${var.guild_server_region}
              raider_io_export_enabled: "true"
              raider_io_region: "eu"
              raider_io_season: "current"
              raider_io_profile_export_cap: "0"
              raider_io_request_sleep_seconds: "0.25"
              profile_candidate_catalog: ${var.profile_candidate_catalog}
              profile_candidate_schema: ${var.profile_candidate_schema}
              excluded_zone_names: ${var.excluded_zone_names}
              live_roster_sheet_id: ${var.live_roster_sheet_id}
              live_roster_sheet_gid: ${var.live_roster_sheet_gid}
              blizzard_profile_export_enabled: ${var.blizzard_profile_export_enabled}
              blizzard_profile_export_cap: ${var.blizzard_profile_export_cap}
              blizzard_profile_sleep_seconds: ${var.blizzard_profile_sleep_seconds}
              guild_zone_ranks_enabled: ${var.guild_zone_ranks_enabled}

    # ── Stage 2: SDP/DLT pipeline ──────────────────────────────────────────────
    # Triggers the bundle-managed DLT pipeline by ID — no hard-coded values.
    sdp_post_ingestion:
      name: sc-analytics-sdp-daily-post-ingestion
      tasks:
        - task_key: run_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.warcraftlogs_pipeline.id}
            full_refresh: false

    # ── Stage 3: write JSON gold-layer assets to UC Volume ─────────────────────
    write_dashboard_assets:
      name: sc-analytics-write-post-sdp
      tasks:
        - task_key: publish_assets
          notebook_task:
            notebook_path: ingestion/jobs/publish_dashboard_assets.py

    # ── Stage 4: trigger GitHub Actions to publish UC Volume → Cloudflare R2 ──
    # The R2 upload itself stays in GitHub Actions; this job only dispatches it
    # via workflow_dispatch and waits for the run to complete.
    publish_post_write:
      name: sc-analytics-publish-post-write
      tasks:
        - task_key: dispatch_publish_workflow
          notebook_task:
            notebook_path: ingestion/jobs/trigger_publish_workflow.py
            base_parameters:
              secret_scope: sc-analytics  # the notebook reads GitHub repo from this secret if 'github_repo' variable is blank
              github_repo: ${var.github_repo}               # set via secret 'github_repo' if blank
              github_workflow: publish-dashboard-data.yml
              github_ref: main
              poll_seconds: "1200"

    # ── Parent orchestrator (the only job with a daily schedule) ──────────────
    # Cron: 22:15 daily, Europe/London (handles BST/GMT automatically).
    # Quartz format: "sec min hour day-of-month month day-of-week" → "0 15 22 * * ?".
    daily_orchestrator:
      name: sc-analytics-daily-orchestrator
      schedule:
        quartz_cron_expression: "0 15 22 * * ?"
        timezone_id: Europe/London
        pause_status: UNPAUSED
      tasks:
        - task_key: ingestion
          run_job_task:
            job_id: ${resources.jobs.ingestion_daily.id}
        - task_key: sdp
          depends_on:
            - task_key: ingestion
          run_job_task:
            job_id: ${resources.jobs.sdp_post_ingestion.id}
        - task_key: write_assets
          depends_on:
            - task_key: sdp
          run_job_task:
            job_id: ${resources.jobs.write_dashboard_assets.id}
        - task_key: publish_to_r2
          depends_on:
            - task_key: write_assets
          run_job_task:
            job_id: ${resources.jobs.publish_post_write.id}
