# Databricks Asset Bundle configuration
# Docs: https://docs.databricks.com/dev-tools/bundles/index.html

bundle:
  name: medallion-pipeline

variables:
  catalog:
    description: Unity Catalog name
    default: main
  schema:
    description: Schema (database) name
    default: pipeline_dev
  pipeline_name:
    description: DLT pipeline display name
    default: Medallion Pipeline
  developer_user:
    description: Email of the developer deploying in development mode
    default: ricard.mulvany@gmail.com

targets:
  development:
    mode: development
    default: true
    run_as:
      user_name: ${var.developer_user}
    variables:
      schema: pipeline_dev

resources:
  pipelines:
    medallion_pipeline:
      name: ${var.pipeline_name}
      catalog: ${var.catalog}
      schema: ${var.schema}

      libraries:
        - notebook:
            path: pipeline/bronze/raw_source.py
        - notebook:
            path: pipeline/silver/clean_entities.py
        - notebook:
            path: pipeline/silver/clean_reports.py
        - notebook:
            path: pipeline/gold/entity_summary.py
        - notebook:
            path: pipeline/gold/summary_products.py

      configuration:
        secret_scope: pipeline-secrets

      development: true
      channel: CURRENT

  jobs:
    nightly_ingestion:
      name: Nightly Ingestion
      schedule:
        quartz_cron_expression: "0 0 1 * * ?"
        timezone_id: UTC
      tasks:
        - task_key: ingest_primary
          notebook_task:
            notebook_path: ingestion/jobs/ingest_primary.py
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 0
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: local[*]
            custom_tags:
              ResourceClass: SingleNode
