# Databricks Asset Bundle configuration
# Docs: https://docs.databricks.com/dev-tools/bundles/index.html

bundle:
  name: warcraftlogs-analytics

sync:
  exclude:
    - frontend/**
    - .github/**
    - node_modules/**
    - "*.md"
    - LICENSE
    - .git/**
    - .venv/**
    - __pycache__/**
    - "*.pyc"
  paths:
    - pipeline
    - ingestion

variables:
  catalog:
    description: Unity Catalog name
    default: 04_sdp
  schema:
    description: Schema (database) name
    default: warcraftlogs
  pipeline_name:
    description: DLT pipeline display name
    default: WarcraftLogs Analytics
  developer_user:
    description: Email of the developer deploying in development mode
    default: ricard.mulvany@gmail.com
  guild_name:
    description: WoW guild name to ingest data for
    default: Student Council
  guild_server_slug:
    description: WoW realm slug (lowercase, hyphens for spaces)
    default: twisting-nether
  guild_server_region:
    description: WoW region (EU, US, KR, TW)
    default: EU

targets:
  development:
    mode: development
    default: true
    variables:
      schema: warcraftlogs
    permissions:
    - user_name: ${var.developer_user}
      level: CAN_MANAGE

resources:
  pipelines:
    warcraftlogs_pipeline:
      permissions:
        - user_name: ${var.developer_user}
          level: CAN_MANAGE
      name: ${var.pipeline_name}
      catalog: ${var.catalog}
      schema: ${var.schema}
      run_as:
        user_name: ${var.developer_user}
      serverless: true

      libraries:
        # Bronze — Auto Loader ingestion from Volume landing zone
        - notebook:
            path: pipeline/bronze/raw_source.py
        # Silver — cleaning, filtering, enrichment
        - notebook:
            path: pipeline/silver/clean_reports.py
        - notebook:
            path: pipeline/silver/clean_attendance.py
        - notebook:
            path: pipeline/silver/clean_players.py
        - notebook:
            path: pipeline/silver/clean_zone_catalog.py
        - notebook:
            path: pipeline/silver/clean_guild_members.py
        - notebook:
            path: pipeline/silver/clean_rankings.py
        - notebook:
            path: pipeline/silver/clean_events.py
        - notebook:
            path: pipeline/silver/clean_raiderio.py
        # Gold — business-ready data products
        - notebook:
            path: pipeline/gold/summary_products.py
        - notebook:
            path: pipeline/gold/player_products.py
        - notebook:
            path: pipeline/gold/core_dimensions.py
        - notebook:
            path: pipeline/gold/core_facts.py
        - notebook:
            path: pipeline/gold/roster_products.py
        - notebook:
            path: pipeline/gold/survivability_products.py
        - notebook:
            path: pipeline/gold/preparation_products.py
        - notebook:
            path: pipeline/gold/mplus_products.py

      configuration:
        secret_scope: pipeline-secrets

      development: true
      channel: CURRENT

  jobs:
    nightly_ingestion:
      name: Nightly WarcraftLogs Ingestion
      schedule:
        quartz_cron_expression: "0 0 1 * * ?"
        timezone_id: UTC
      tasks:
        - task_key: ingest_primary
          notebook_task:
            notebook_path: ingestion/jobs/ingest_primary.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              guild_name: ${var.guild_name}
              guild_server_slug: ${var.guild_server_slug}
              guild_server_region: ${var.guild_server_region}
              raider_io_export_enabled: "true"
              raider_io_region: "eu"
              raider_io_season: "current"
              raider_io_profile_export_cap: "0"
              raider_io_request_sleep_seconds: "0.25"
