# Secret Scope Template
# This file documents the expected secrets — it does NOT contain real values.
# Run scripts/bootstrap_secrets.sh to create these in your Databricks workspace.

scope: pipeline-secrets

keys:
  - key: api-key
    description: "API key for the source data provider"
    required: true

  - key: api-base-url
    description: "Base URL for the source API (e.g. https://api.example.com)"
    required: true

# To reference these in pipeline notebooks:
#   dbutils.secrets.get(scope="pipeline-secrets", key="api-key")
