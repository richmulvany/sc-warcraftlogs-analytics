name: Deploy Pipeline

on:
  push:
    branches: ["**"]
    paths:
      - "pipeline/**"
      - "ingestion/**"
      - "infra/**"
      - "databricks.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy DLT Pipeline
    runs-on: ubuntu-latest
    environment: production
    if: github.repository != 'richmulvany/databricks-pipeline-template'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main
      - name: Validate Asset Bundle on feature branches
        if: github.ref != 'refs/heads/main'
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks bundle validate --target development
          databricks bundle validate --target production
      - name: Deploy via Asset Bundles
        if: github.ref == 'refs/heads/main'
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          BUNDLE_VAR_service_principal_application_id: ${{ secrets.DATABRICKS_SP_APP_ID }}
        run: databricks bundle deploy --target production
