name: Deploy Pipeline

on:
  push:
    branches: ["**"]
    paths:
      - "pipeline/**"
      - "ingestion/**"
      - "infra/**"
      - "databricks.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy DLT Pipeline
    runs-on: ubuntu-latest
    environment: production
    if: github.repository == 'richmulvany/sc-warcraftlogs-analytics'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main
      - name: Validate Asset Bundle on feature branches
        if: github.ref != 'refs/heads/main'
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          BUNDLE_VAR_developer_user: ${{ secrets.DATABRICKS_USER_NAME }}
        run: |
          if [ -z "$BUNDLE_VAR_developer_user" ]; then
            echo "::error title=Missing DATABRICKS_USER_NAME::Set the production environment secret DATABRICKS_USER_NAME to the Databricks user email used for Free Edition deployments."
            exit 1
          fi
          databricks bundle validate --target development
          databricks bundle validate --target production
      - name: Deploy via Asset Bundles
        if: github.ref == 'refs/heads/main'
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          BUNDLE_VAR_developer_user: ${{ secrets.DATABRICKS_USER_NAME }}
        run: |
          if [ -z "$BUNDLE_VAR_developer_user" ]; then
            echo "::error title=Missing DATABRICKS_USER_NAME::Set the production environment secret DATABRICKS_USER_NAME to the Databricks user email used for Free Edition deployments."
            exit 1
          fi
          databricks bundle deploy --target production
