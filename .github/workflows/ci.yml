name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint & Test (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint with ruff
        run: ruff check ingestion/ pipeline/ scripts/
      - name: Format check
        run: ruff format --check ingestion/ pipeline/ scripts/
      - name: Type check with mypy
        run: mypy ingestion/src pipeline/
      - name: Run tests
        run: pytest ingestion/tests pipeline/tests --cov=ingestion/src --cov=pipeline --cov-report=xml -q
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Type check
        run: cd frontend && npm run typecheck
      - name: Build
        run: cd frontend && npm run build
        env:
          VITE_DATA_BASE_URL: https://example.com/data
