name: sc-analytics-publish-dashboard-data

on:
  # Triggered exclusively by the Databricks parent orchestrator
  # (sc-analytics-daily-orchestrator) via GitHub workflow_dispatch.
  # Manual UI runs are also supported.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sc-analytics-publish-dashboard-data
  cancel-in-progress: false

jobs:
  publish:
    name: sc-analytics-publish-dashboard-data
    runs-on: ubuntu-latest
    if: github.repository == 'richmulvany/sc-warcraftlogs-analytics'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@v0.277.0

      - name: Download latest dashboard assets
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          mkdir -p dashboard_exports
          databricks fs cp \
            dbfs:/Volumes/03_gold/sc_analytics/dashboard_exports/latest \
            ./dashboard_exports/latest \
            -r

      - name: Validate manifest, file sizes, and export size
        run: |
          test -f ./dashboard_exports/latest/manifest.json
          find ./dashboard_exports/latest -name '*.json' | grep -q .
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          latest = Path("dashboard_exports/latest")
          manifest = json.loads((latest / "manifest.json").read_text())
          json_files = sorted(latest.glob("*.json"))
          total_bytes = 0
          default_file_limit = 25 * 1024 * 1024
          file_limit_overrides = {
              "player_death_events.json": 40 * 1024 * 1024,
          }
          total_limit = 175 * 1024 * 1024

          print("generated_at:", manifest["generated_at"])
          print("snapshot_id:", manifest["snapshot_id"])
          print("dataset_count:", len(manifest["datasets"]))
          print("file size summary:")

          for path in json_files:
              size = path.stat().st_size
              total_bytes += size
              print(f"  {path.name}: {size} bytes")
              file_limit = file_limit_overrides.get(path.name, default_file_limit)
              if size > file_limit:
                  limit_mb = file_limit // (1024 * 1024)
                  print(f"ERROR: {path.name} exceeds {limit_mb} MB", file=sys.stderr)
                  sys.exit(1)

          print("total_bytes:", total_bytes)
          if total_bytes > total_limit:
              limit_mb = total_limit // (1024 * 1024)
              print(f"ERROR: latest/ exceeds {limit_mb} MB", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Upload latest assets to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PREFIX: ${{ secrets.R2_PREFIX }}
        run: |
          NORMALISED_PREFIX="${R2_PREFIX#/}"
          NORMALISED_PREFIX="${NORMALISED_PREFIX%/}"
          if [ -z "${NORMALISED_PREFIX}" ]; then
            LATEST_KEY="latest"
          elif [ "${NORMALISED_PREFIX}" = "latest" ]; then
            LATEST_KEY="latest"
          elif [ "${NORMALISED_PREFIX#*/}" != "${NORMALISED_PREFIX}" ] && [ "${NORMALISED_PREFIX##*/}" = "latest" ]; then
            LATEST_KEY="${NORMALISED_PREFIX}"
          else
            LATEST_KEY="${NORMALISED_PREFIX}/latest"
          fi
          aws s3 sync ./dashboard_exports/latest "s3://${R2_BUCKET}/${LATEST_KEY}" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --delete \
            --cache-control "public, max-age=300"

      - name: Upload current snapshot to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PREFIX: ${{ secrets.R2_PREFIX }}
        run: |
          SNAPSHOT_ID="$(python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path("dashboard_exports/latest/manifest.json").read_text())
          print(manifest["snapshot_id"])
          PY
          )"
          NORMALISED_PREFIX="${R2_PREFIX#/}"
          NORMALISED_PREFIX="${NORMALISED_PREFIX%/}"
          if [ -z "${NORMALISED_PREFIX}" ]; then
            SNAPSHOT_KEY="snapshots/${SNAPSHOT_ID}"
          elif [ "${NORMALISED_PREFIX}" = "latest" ]; then
            SNAPSHOT_KEY="snapshots/${SNAPSHOT_ID}"
          elif [ "${NORMALISED_PREFIX#*/}" != "${NORMALISED_PREFIX}" ] && [ "${NORMALISED_PREFIX##*/}" = "latest" ]; then
            SNAPSHOT_ROOT="${NORMALISED_PREFIX%/latest}"
            if [ -n "${SNAPSHOT_ROOT}" ]; then
              SNAPSHOT_KEY="${SNAPSHOT_ROOT}/snapshots/${SNAPSHOT_ID}"
            else
              SNAPSHOT_KEY="snapshots/${SNAPSHOT_ID}"
            fi
          else
            SNAPSHOT_KEY="${NORMALISED_PREFIX}/snapshots/${SNAPSHOT_ID}"
          fi
          aws s3 sync ./dashboard_exports/latest "s3://${R2_BUCKET}/${SNAPSHOT_KEY}" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --delete \
            --cache-control "public, max-age=300"
