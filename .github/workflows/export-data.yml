name: Export Data

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  export:
    name: Export frontend data CSVs
    runs-on: ubuntu-latest
    if: github.repository != 'richmulvany/databricks-pipeline-template'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -e "."
      - name: Run export
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_CATALOG: ${{ vars.DATABRICKS_CATALOG }}
          DATABRICKS_SCHEMA: ${{ vars.DATABRICKS_SCHEMA }}
          LIVE_ROSTER_SHEET_ID: ${{ vars.LIVE_ROSTER_SHEET_ID }}
          LIVE_ROSTER_SHEET_GID: ${{ vars.LIVE_ROSTER_SHEET_GID }}
          EXPORT_OUTPUT_DIR: frontend/public/data
        run: python scripts/export_gold_tables.py
      - name: Commit exported data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/
          git diff --staged --quiet || git commit -m "chore: nightly data export [skip ci]"
          git push
